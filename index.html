<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoOdyssey Benchmark</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #fafafa;
        }
        .header-container {
            text-align: center;
            padding: 60px 20px 40px;
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }
        .project-logo {
            width: 80px; /* 如果有logo可以取消注释并在HTML中添加img标签 */
            margin-bottom: 15px;
        }
        .project-title {
            font-size: 2.8em;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #242424;
        }
        .project-subtitle {
            font-size: 1.5em;
            font-weight: 400;
            color: #555;
            margin: 0 auto 20px auto;
            max-width: 800px;
            line-height: 1.4;
        }
        .authors {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 5px;
        }
        .venue {
            font-size: 1.1em;
            color: #888;
            margin-bottom: 25px;
            font-style: italic;
        }
        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            background-color: #363636;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1.05em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .btn:hover {
            background-color: #555555;
            transform: translateY(-2px);
        }
        /* 主体内容区限制宽度居中 */
        .content-section {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="project-title">🪐 VideoOdyssey</h1>
        <h2 class="project-subtitle">A Benchmark for Ultra-long-context and Omnimodal Video Understanding</h2>
        
        <div class="authors">Anonymous Authors</div>
        <div class="venue">Under Double-blind Peer Review</div>

        <div class="button-group">
            <a href="#" class="btn"><i class="fas fa-file-pdf"></i> Paper</a>
            <a href="https://github.com/videoodyssey-project" target="_blank" class="btn"><i class="fab fa-github"></i> Code</a>
            <a href="#" class="btn"><i class="fas fa-database"></i> Dataset</a>
            <a href="#leaderboard" class="btn"><i class="fas fa-trophy"></i> Leaderboard</a>
        </div>
    </div>

    <div class="content-section">
        </div>

</body>
</html>
